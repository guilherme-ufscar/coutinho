name: Build Android APK

# Builda o APK do app do cliente (Capacitor) — só /app/*, sem landing/admin no bundle nativo.
# Roda em ubuntu-latest, que já vem com Android SDK pré-instalado (não temos SDK/Gradle no
# ambiente de desenvolvimento local, ver DECISIONS.md Fase 9).
on:
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/config/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:
    inputs:
      api_url:
        description: "URL da API que o APK vai consumir"
        required: false
        default: "https://api.couthealth.com.br"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Build do bundle web (só /app/*)
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ github.event.inputs.api_url || 'https://api.couthealth.com.br' }}
        run: npm run build

      - name: Sincronizar com o projeto Android
        working-directory: apps/web
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Instalar plataforma/build-tools do compileSdk usado pelo projeto
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build APK debug
        working-directory: apps/web/android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: couthealth-app-debug
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
